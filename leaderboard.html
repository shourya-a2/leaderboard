<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WayArena - Game Over</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --sand-light: #e8d4b8;
      --sand-medium: #c4a574;
      --sand-dark: #a67c52;
      --brick-orange: #c45c2c;
      --brick-brown: #8b4513;
      --gold: #ffd700;
      --gold-dark: #daa520;
      --white: #ffffff;
      --text-dark: #3d2815;
      --panel-bg: rgba(61, 40, 21, 0.85);
      --panel-border: #8b5a2b;
      
      /* Spell Colors */
      --spell-blue: #00BFFF;
      --spell-green: #00FF00;
      --spell-red: #FF4444;
      --spell-gold: #FFD700;
    }

    body {
      min-height: 100vh;
      background: #2a1a0a;
      font-family: 'Fredoka', sans-serif;
      color: var(--white);
      overflow-x: hidden;
    }

    /* Background image with dimming filter */
    .bg-image {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url('arena-bg.png') center center / cover no-repeat;
      filter: brightness(0.72) saturate(0.6);
      pointer-events: none;
      z-index: -2;
    }

    /* Floating Spell Particles */
    .particles-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .spell-orb {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      opacity: 0;
      filter: blur(2px);
      animation: float linear infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) translateX(0) scale(0.5);
        opacity: 0;
      }
      10% {
        opacity: 0.6;
      }
      50% {
        transform: translateY(50vh) translateX(30px) scale(0.8);
        opacity: 0.5;
      }
      90% {
        opacity: 0.4;
      }
      100% {
        transform: translateY(-10vh) translateX(-20px) scale(1);
        opacity: 0;
      }
    }

    /* Blue Orbs */
    .spell-orb.blue {
      background: var(--spell-blue);
      box-shadow: 0 0 10px var(--spell-blue), 0 0 20px var(--spell-blue);
    }

    /* Green Orbs */
    .spell-orb.green {
      background: var(--spell-green);
      box-shadow: 0 0 10px var(--spell-green), 0 0 20px var(--spell-green);
    }

    /* Red Orbs */
    .spell-orb.red {
      background: var(--spell-red);
      box-shadow: 0 0 10px var(--spell-red), 0 0 20px var(--spell-red);
    }

    /* Gold Orbs */
    .spell-orb.gold {
      background: var(--spell-gold);
      box-shadow: 0 0 10px var(--spell-gold), 0 0 20px var(--spell-gold);
    }

    /* Individual orb positions, sizes, and timings */
    .spell-orb:nth-child(1) { left: 5%; width: 10px; height: 10px; animation-duration: 12s; animation-delay: 0s; }
    .spell-orb:nth-child(2) { left: 12%; width: 8px; height: 8px; animation-duration: 10s; animation-delay: 1s; }
    .spell-orb:nth-child(3) { left: 20%; width: 14px; height: 14px; animation-duration: 14s; animation-delay: 2s; }
    .spell-orb:nth-child(4) { left: 28%; width: 10px; height: 10px; animation-duration: 11s; animation-delay: 0.5s; }
    .spell-orb:nth-child(5) { left: 35%; width: 12px; height: 12px; animation-duration: 13s; animation-delay: 3s; }
    .spell-orb:nth-child(6) { left: 45%; width: 8px; height: 8px; animation-duration: 9s; animation-delay: 1.5s; }
    .spell-orb:nth-child(7) { left: 55%; width: 16px; height: 16px; animation-duration: 15s; animation-delay: 0.8s; }
    .spell-orb:nth-child(8) { left: 62%; width: 10px; height: 10px; animation-duration: 11s; animation-delay: 2.5s; }
    .spell-orb:nth-child(9) { left: 70%; width: 12px; height: 12px; animation-duration: 12s; animation-delay: 1.2s; }
    .spell-orb:nth-child(10) { left: 78%; width: 8px; height: 8px; animation-duration: 10s; animation-delay: 3.5s; }
    .spell-orb:nth-child(11) { left: 85%; width: 14px; height: 14px; animation-duration: 14s; animation-delay: 0.3s; }
    .spell-orb:nth-child(12) { left: 92%; width: 10px; height: 10px; animation-duration: 11s; animation-delay: 2s; }
    .spell-orb:nth-child(13) { left: 8%; width: 12px; height: 12px; animation-duration: 13s; animation-delay: 4s; }
    .spell-orb:nth-child(14) { left: 40%; width: 10px; height: 10px; animation-duration: 12s; animation-delay: 5s; }
    .spell-orb:nth-child(15) { left: 65%; width: 8px; height: 8px; animation-duration: 10s; animation-delay: 4.5s; }
    .spell-orb:nth-child(16) { left: 88%; width: 12px; height: 12px; animation-duration: 14s; animation-delay: 6s; }

    /* Subtle overlay for readability */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.15) 0%, rgba(0, 0, 0, 0.3) 100%);
      pointer-events: none;
      z-index: -1;
    }

    /* Logo */
    .logo-container {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
    }

    .logo {
      height: 80px;
      width: auto;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 24px;
      margin-top: 40px;
    }

    .game-over-title {
      font-family: 'Press Start 2P', cursive;
      font-size: clamp(24px, 5vw, 40px);
      color: var(--gold);
      text-shadow: 
        4px 4px 0 var(--brick-brown),
        -1px -1px 0 var(--brick-brown),
        1px -1px 0 var(--brick-brown),
        -1px 1px 0 var(--brick-brown);
      animation: bounceIn 0.5s ease-out forwards;
      transform: scale(0.8);
      letter-spacing: 2px;
    }

    @keyframes bounceIn {
      0% { transform: scale(0.8); opacity: 0; }
      60% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Main Layout */
    .main-content {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 20px;
      flex: 1;
      align-items: start;
    }

    /* Side Panel */
    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Pixel Panel Style - matches game brick aesthetic */
    .pixel-panel {
      background: var(--panel-bg);
      border: 4px solid var(--panel-border);
      padding: 20px;
      position: relative;
    }

    /* Inner pixel border effect */
    .pixel-panel::before {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      right: 2px;
      bottom: 2px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      pointer-events: none;
    }

    .panel-title {
      font-family: 'Fredoka', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--gold);
      text-align: center;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Sharpshooter Panel */
    .sharpshooter-badge {
      width: 48px;
      height: 48px;
      background: url('Badge 2.png') no-repeat center center;
      background-size: contain;
      margin: 0 auto 10px auto;
    }

    .sharpshooter-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      text-align: center;
      margin-bottom: 4px;
    }

    .sharpshooter-accuracy {
      font-size: 28px;
      font-weight: 700;
      color: var(--gold);
      text-align: center;
    }

    .sharpshooter-label {
      font-size: 12px;
      color: var(--sand-light);
      text-align: center;
      margin-top: 4px;
    }

    /* Your Stats */
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 2px solid rgba(255, 255, 255, 0.1);
    }

    .stat-row:last-child {
      border-bottom: none;
    }

    .stat-label {
      font-size: 13px;
      color: var(--sand-light);
      font-weight: 500;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--white);
    }

    /* Leaderboard */
    .leaderboard-wrapper {
      display: flex;
      flex-direction: column;
    }

    .leaderboard-header {
      display: grid;
      grid-template-columns: 50px 1fr 70px 90px;
      gap: 0 12px;
      padding: 12px 16px;
      background: var(--brick-brown);
      border: 4px solid var(--panel-border);
      border-bottom: none;
    }

    .leaderboard-header span {
      font-size: 12px;
      font-weight: 600;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .leaderboard-header span:nth-child(3),
    .leaderboard-header span:nth-child(4) {
      text-align: right;
    }

    .leaderboard {
      max-height: calc(100vh - 280px);
      overflow-y: auto;
      background: var(--panel-bg);
      border: 4px solid var(--panel-border);
      border-top: none;
    }

    .leaderboard::-webkit-scrollbar {
      width: 8px;
    }

    .leaderboard::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.2);
    }

    .leaderboard::-webkit-scrollbar-thumb {
      background: var(--panel-border);
    }

    .leaderboard-row {
      display: grid;
      grid-template-columns: 50px 1fr 70px 90px;
      gap: 0 12px;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 2px solid rgba(255, 255, 255, 0.08);
      transition: background 0.15s ease;
    }

    .leaderboard-row:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    /* Rank styling */
    .rank {
      font-size: 18px;
      font-weight: 700;
      text-align: center;
    }

    .player-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--white);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 8px;
    }

    .stun-count, .accuracy {
      font-size: 16px;
      font-weight: 600;
      text-align: right;
      color: var(--sand-light);
    }

    /* Top 3 Ranks */
    .leaderboard-row.rank-1 {
      background: linear-gradient(90deg, rgba(255, 215, 0, 0.2) 0%, rgba(255, 215, 0, 0.1) 100%);
      border-left: 4px solid var(--gold);
    }

    .leaderboard-row.rank-1 .rank {
      color: var(--gold);
    }

    .leaderboard-row.rank-1 .rank::before {
      content: '';
      font-size: 14px;
    }

    .leaderboard-row.rank-2 {
      background: linear-gradient(90deg, rgba(192, 192, 192, 0.15) 0%, rgba(192, 192, 192, 0.05) 100%);
      border-left: 4px solid #c0c0c0;
    }

    .leaderboard-row.rank-2 .rank {
      color: #c0c0c0;
    }

    .leaderboard-row.rank-3 {
      background: linear-gradient(90deg, rgba(205, 127, 50, 0.15) 0%, rgba(205, 127, 50, 0.05) 100%);
      border-left: 4px solid #cd7f32;
    }

    .leaderboard-row.rank-3 .rank {
      color: #cd7f32;
    }

    /* Current Player Highlight */
    .leaderboard-row.current-player {
      background: rgba(255, 255, 255, 0.08);
      border-left: 4px solid var(--gold);
    }

    .you-tag {
      display: inline-block;
      background: var(--gold);
      color: var(--text-dark);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      margin-right: 6px;
      border-radius: 2px;
    }

    /* Top Accuracy Highlight - removed, already shown in panel */
    .leaderboard-row.top-accuracy .accuracy {
      color: var(--sand-light);
      font-weight: 700;
    }

    /* Play Again Button */
    .footer {
      text-align: center;
      margin-top: 20px;
      padding-bottom: 20px;
    }

    .play-again-btn {
      font-family: 'Fredoka', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--text-dark);
      background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%);
      border: 4px solid var(--brick-brown);
      padding: 14px 40px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: transform 0.1s ease, filter 0.1s ease;
    }

    .play-again-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
    }

    .play-again-btn:active {
      transform: translateY(1px);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .main-content {
        grid-template-columns: 1fr;
      }

      .side-panel {
        order: 2;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .leaderboard-wrapper {
        order: 1;
      }

      .header {
        margin-top: 60px;
      }
    }

    @media (max-width: 480px) {
      .side-panel {
        grid-template-columns: 1fr;
      }

      .leaderboard-header,
      .leaderboard-row {
        grid-template-columns: 40px 1fr 60px 60px;
        padding: 10px 12px;
      }

      .game-over-title {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <!-- Background Image -->
  <div class="bg-image"></div>

  <!-- Floating Spell Particles -->
  <div class="particles-container">
    <div class="spell-orb blue"></div>
    <div class="spell-orb green"></div>
    <div class="spell-orb red"></div>
    <div class="spell-orb gold"></div>
    <div class="spell-orb blue"></div>
    <div class="spell-orb green"></div>
    <div class="spell-orb red"></div>
    <div class="spell-orb gold"></div>
    <div class="spell-orb blue"></div>
    <div class="spell-orb green"></div>
    <div class="spell-orb red"></div>
    <div class="spell-orb gold"></div>
    <div class="spell-orb blue"></div>
    <div class="spell-orb green"></div>
    <div class="spell-orb red"></div>
    <div class="spell-orb gold"></div>
  </div>

  <div class="logo-container">
    <img src="Wayarena logo.png" alt="WayArena" class="logo">
  </div>

  <div class="container">
    <header class="header">
      <h1 class="game-over-title">GAME OVER!</h1>
    </header>

    <div class="main-content">
      <!-- Side Panel -->
      <div class="side-panel">
        <!-- Sharpshooter Award -->
        <div class="pixel-panel">
          <div class="panel-title">Highest Accuracy</div>
          <div class="sharpshooter-badge"></div>
          <div class="sharpshooter-name" id="sharpshooter-name">Sanskar</div>
          <div class="sharpshooter-accuracy" id="sharpshooter-accuracy">94%</div>
        </div>

        <!-- Your Stats -->
        <div class="pixel-panel">
          <div class="panel-title">Your Stats</div>
          <div class="stat-row">
            <span class="stat-label">Your Stuns</span>
            <span class="stat-value" id="your-stuns">3</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Got Stunned</span>
            <span class="stat-value" id="got-stunned">14</span>
          </div>
        </div>
      </div>

      <!-- Leaderboard -->
      <div class="leaderboard-wrapper">
        <div class="leaderboard-header">
          <span>#</span>
          <span>Name</span>
          <span>Stuns</span>
          <span>Accuracy</span>
        </div>
        <div class="leaderboard" id="leaderboard">
          <!-- Rows populated by JS -->
        </div>
      </div>
    </div>

    <footer class="footer">
      <button class="play-again-btn" onclick="restartGame()">Play Again</button>
    </footer>
  </div>

  <script>
    const leaderboardData = [
      { name: 'karararan', stuns: 30, accuracy: 88 },
      { name: 'Sanskar', stuns: 21, accuracy: 94 },
      { name: 'ANKITG X DEEPAKC', stuns: 11, accuracy: 72 },
      { name: 'rachit', stuns: 8, accuracy: 65 },
      { name: 'Astha', stuns: 5, accuracy: 58 },
      { name: 'Shourya', stuns: 3, accuracy: 45 },
      { name: 'PlayerSeven', stuns: 3, accuracy: 42 },
      { name: 'GamerEight', stuns: 2, accuracy: 38 },
      { name: 'NinjaPlayer', stuns: 2, accuracy: 35 },
      { name: 'TenthPlace', stuns: 1, accuracy: 30 },
      { name: 'EleventhGuy', stuns: 1, accuracy: 28 },
      { name: 'TwelfthOne', stuns: 0, accuracy: 20 },
    ];

    const currentPlayerName = 'Shourya';

    function createLeaderboard() {
      const leaderboard = document.getElementById('leaderboard');
      
      // Find highest accuracy player
      const highestAccuracy = Math.max(...leaderboardData.map(p => p.accuracy));
      const topAccuracyPlayer = leaderboardData.find(p => p.accuracy === highestAccuracy);

      // Update sharpshooter panel
      document.getElementById('sharpshooter-name').textContent = topAccuracyPlayer.name;
      document.getElementById('sharpshooter-accuracy').textContent = topAccuracyPlayer.accuracy + '%';

      // Find current player stats
      const currentPlayer = leaderboardData.find(p => p.name === currentPlayerName);
      if (currentPlayer) {
        document.getElementById('your-stuns').textContent = currentPlayer.stuns;
        const playerIndex = leaderboardData.indexOf(currentPlayer);
        document.getElementById('got-stunned').textContent = Math.floor(Math.random() * 15) + 5; // Mock data
      }

      // Create rows
      leaderboardData.forEach((player, index) => {
        const rank = index + 1;
        const isCurrentPlayer = player.name === currentPlayerName;
        const isTopAccuracy = player.accuracy === highestAccuracy;
        
        let rowClasses = ['leaderboard-row'];
        if (rank === 1) rowClasses.push('rank-1');
        if (rank === 2) rowClasses.push('rank-2');
        if (rank === 3) rowClasses.push('rank-3');
        if (isCurrentPlayer) rowClasses.push('current-player');
        if (isTopAccuracy) rowClasses.push('top-accuracy');

        const row = document.createElement('div');
        row.className = rowClasses.join(' ');
        row.style.animationDelay = `${index * 0.05}s`;

        const nameDisplay = isCurrentPlayer 
          ? `<span class="you-tag">YOU</span>${player.name}`
          : player.name;

        row.innerHTML = `
          <span class="rank">${rank}</span>
          <span class="player-name">${nameDisplay}</span>
          <span class="stun-count">${player.stuns}</span>
          <span class="accuracy">${player.accuracy}%</span>
        `;

        leaderboard.appendChild(row);
      });
    }

    function restartGame() {
      alert('Starting new game...');
    }

    // Initialize
    createLeaderboard();
  </script>
</body>
</html>
