<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wayarena - Figma Q&A Screen V2</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Fredoka:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --blue-bright: #00BFFF;
            --green-bright: #00FF00;
            --red-bright: #FF4444;
            --yellow-bright: #FFD700;
            --success-gold: #FFD700;
            --wrong-gray: #999999;
            --bounce-ease: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body {
            min-height: 100vh;
            background: url('QnA screen.png') center center;
            background-size: cover;
            font-family: 'Quicksand', 'Fredoka', system-ui, sans-serif;
            overflow: hidden;
            position: relative;
        }

        .game-container {
            width: 100%;
            height: 100vh;
            position: relative;
            z-index: 2;
            max-width: 1280px;
            margin: 0 auto;
        }

        /* ==================== HUD BAR ==================== */
        .hud-bar {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 1280px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 12px;
            z-index: 100;
        }

        .hud-left {
            display: flex;
            align-items: center;
            flex: 1;
        }

        .hud-center {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .hud-right {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
            justify-content: flex-end;
        }

        .wayarena-logo {
            height: 56px;
            width: auto;
        }

        /* Timer */
        .timer-display {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #3a0f10;
            border: 2px solid #d4a96a;
            padding: 8px 12px;
            min-width: 64px;
            height: 40px;
        }

        .timer-icon {
            width: 16px;
            height: 16px;
            object-fit: contain;
        }

        .timer-text {
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            font-size: 16px;
            color: white;
        }

        /* ==================== SPELL SQUARES ==================== */
        .spells-container {
            display: flex;
            align-items: center;
            gap: 6px;
            position: relative;
        }

        .spell-square {
            width: 31px;
            height: 31px;
            background: #ddd;
            border: 2px solid;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            cursor: pointer;
            transition: transform 0.2s ease, filter 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .spell-square:hover {
            transform: scale(1.1);
        }

        .spell-square.red { border-color: #e43b44; }
        .spell-square.blue { border-color: #0095e9; }
        .spell-square.green { border-color: #3e8948; }

        .spell-square img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .spell-icon-glow {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .spell-icon-glow.glowing-bright {
            opacity: 1;
            animation: icon-glow-bright 0.4s var(--bounce-ease);
        }

        .spell-icon-glow.glowing-dim {
            opacity: 0.5;
            animation: icon-glow-dim 0.3s ease-out;
        }

        @keyframes icon-glow-bright {
            0% { box-shadow: 0 0 0 rgba(255, 255, 255, 0); transform: scale(1); }
            50% { box-shadow: 0 0 20px rgba(255, 255, 255, 0.9), 0 0 40px rgba(255, 215, 0, 0.6); transform: scale(1.3); }
            100% { box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); transform: scale(1); }
        }

        @keyframes icon-glow-dim {
            0% { box-shadow: 0 0 0 rgba(150, 150, 150, 0); transform: scale(1); }
            50% { box-shadow: 0 0 10px rgba(150, 150, 150, 0.5); transform: scale(1.1); }
            100% { box-shadow: 0 0 5px rgba(150, 150, 150, 0.3); transform: scale(1); }
        }

        .spells-container.receiving-reward {
            animation: bar-receive-pulse 0.5s var(--bounce-ease);
        }

        .spells-container.receiving-reward .spell-square {
            filter: brightness(1.4) drop-shadow(0 0 15px white);
        }

        @keyframes bar-receive-pulse {
            0% { transform: scale(1); }
            40% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        .spells-container.glowing-bright .spell-square {
            filter: brightness(1.3) saturate(1.2) drop-shadow(0 0 12px var(--yellow-bright));
            transition: filter 0.2s ease;
        }

        .spells-container.glowing-dim .spell-square {
            filter: brightness(1.1) saturate(0.9) drop-shadow(0 0 6px rgba(150, 150, 150, 0.5));
            transition: filter 0.2s ease;
        }

        .spell-bar-progress-text {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            font-weight: 700;
            color: var(--yellow-bright);
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.7);
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.2s ease;
            pointer-events: none;
            white-space: nowrap;
        }

        .spell-bar-progress-text.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(-4px);
        }

        /* ==================== STUNS BADGE ==================== */
        .stuns-badge {
            height: auto;
        }

        .stuns-badge img {
            height: 32px;
            width: auto;
        }

        /* ==================== QUESTION AREA ==================== */
        .question-container {
            position: fixed;
            top: 114px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 1264px;
            padding: 16px 8px 8px;
        }

        .question-box {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
            width: 100%;
            max-width: 744px;
            margin: 0 auto;
        }

        .question-card {
            background: rgba(18, 21, 23, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            text-align: center;
            position: relative;
        }

        .question-pill {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: #20121d;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 28px;
            padding: 4px 16px;
        }

        .question-pill-text {
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            font-size: 16px;
            color: white;
        }

        .question-text {
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            font-size: 24px;
            color: white;
            line-height: 32px;
            letter-spacing: -0.36px;
        }

        /* ==================== ANSWER CARDS ==================== */
        .answer-cards-container {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            padding: 0 8px;
            max-width: 1264px;
            width: 100%;
            justify-content: center;
        }

        .answer-card {
            width: 306px;
            height: 264px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            font-size: 28px;
            color: white;
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: inset 0px -8px 0px 0px rgba(0, 0, 0, 0.2);
        }

        .answer-card.blue { background: linear-gradient(to bottom, #057cea, #0d4b83); }
        .answer-card.cyan { background: linear-gradient(to bottom, #00b3c3, #007474); }
        .answer-card.orange { background: linear-gradient(to bottom, #ffb329, #dd630c); }
        .answer-card.pink { background: linear-gradient(to bottom, #f8547e, #d81159); }

        .card-number {
            position: absolute;
            top: 7px;
            right: 7px;
            width: 32px;
            height: 32px;
            border: 2px solid rgba(9, 9, 9, 0.2);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            font-size: 16px;
            color: white;
        }

        .answer-card:hover:not(.disabled) {
            transform: scale(1.03);
            filter: brightness(1.1);
            box-shadow: inset 0px -8px 0px 0px rgba(0, 0, 0, 0.2), 0 0 20px rgba(255,255,255,0.3);
        }

        .answer-card:active:not(.disabled) {
            transform: scale(0.97);
        }

        .answer-card.disabled {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(0.3);
        }

        .answer-card.selected-correct {
            transform: scale(1.08);
            border: 4px solid var(--success-gold);
            box-shadow: 0 0 30px var(--success-gold), inset 0px -8px 0px 0px rgba(0, 0, 0, 0.2);
            animation: correctPulse 0.8s ease-out;
        }

        @keyframes correctPulse {
            0% { box-shadow: 0 0 30px var(--success-gold), inset 0px -8px 0px 0px rgba(0, 0, 0, 0.2); filter: brightness(1); }
            15% { box-shadow: 0 0 60px var(--success-gold), inset 0 0 30px rgba(255, 255, 255, 0.5); filter: brightness(1.4); }
            40% { box-shadow: 0 0 40px var(--success-gold), inset 0px -8px 0px 0px rgba(0, 0, 0, 0.2); filter: brightness(1.1); }
            100% { box-shadow: 0 0 30px var(--success-gold), inset 0px -8px 0px 0px rgba(0, 0, 0, 0.2); filter: brightness(1); }
        }

        .answer-card.selected-wrong {
            animation: shake 0.3s linear;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .card-checkmark {
            position: absolute;
            font-size: 64px;
            color: #00FF00;
            text-shadow: 0 0 20px #00FF00;
            opacity: 0;
            transform: scale(0);
        }

        .answer-card.selected-correct .card-checkmark {
            animation: checkmarkPop 0.3s var(--bounce-ease) forwards;
        }

        @keyframes checkmarkPop {
            0% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .card-xmark {
            position: absolute;
            font-size: 48px;
            color: var(--wrong-gray);
            opacity: 0;
        }

        .answer-card.selected-wrong .card-xmark {
            animation: xmarkFade 0.6s ease-out;
        }

        @keyframes xmarkFade {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        /* ==================== PARTICLES & EFFECTS ==================== */
        .spell-particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            animation: particle-burst 0.5s ease-out forwards;
        }

        @keyframes particle-burst {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        @keyframes float-up-fade {
            0% { transform: translateX(-50%) translateY(0); opacity: 1; }
            100% { transform: translateX(-50%) translateY(-30px); opacity: 0; }
        }

        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 500;
            overflow: hidden;
        }

        .flying-reward {
            position: fixed;
            pointer-events: none;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 20px;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .flying-reward.red {
            background: radial-gradient(circle, #FF6B6B, #FF4444);
            filter: drop-shadow(0 0 15px #FF4444) drop-shadow(0 0 30px rgba(255, 68, 68, 0.5));
            box-shadow: 0 0 20px #FF4444, 0 0 40px rgba(255, 68, 68, 0.4);
        }

        .flying-reward.blue {
            background: radial-gradient(circle, #00BFFF, #0099CC);
            filter: drop-shadow(0 0 15px #00BFFF) drop-shadow(0 0 30px rgba(0, 191, 255, 0.5));
            box-shadow: 0 0 20px #00BFFF, 0 0 40px rgba(0, 191, 255, 0.4);
        }

        .flying-reward.green {
            background: radial-gradient(circle, #6BCB77, #22c55e);
            filter: drop-shadow(0 0 15px #22c55e) drop-shadow(0 0 30px rgba(34, 197, 94, 0.5));
            box-shadow: 0 0 20px #22c55e, 0 0 40px rgba(34, 197, 94, 0.4);
        }

        .flying-trail {
            position: fixed;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1999;
        }

        .flying-trail.red {
            background: radial-gradient(circle, white, #FF6B6B);
            box-shadow: 0 0 10px #FF4444;
        }

        .flying-trail.blue {
            background: radial-gradient(circle, white, #00BFFF);
            box-shadow: 0 0 10px #00BFFF;
        }

        .flying-trail.green {
            background: radial-gradient(circle, white, #6BCB77);
            box-shadow: 0 0 10px #22c55e;
        }

        .spell-square.receiving-reward {
            animation: receive-pulse 0.4s var(--bounce-ease);
        }

        @keyframes receive-pulse {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.3); filter: brightness(1.5); }
            100% { transform: scale(1); filter: brightness(1); }
        }

        /* ==================== FOOTER INFO ==================== */
        .footer-info {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            z-index: 10;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- HUD Bar -->
        <div class="hud-bar" id="hud-bar">
            <div class="hud-left">
                <img src="wayarena thumbnail.png" alt="Wayarena" class="wayarena-logo">
            </div>

            <div class="hud-center">
                <!-- Timer -->
                <div class="timer-display">
                    <img src="leadingIcon.png" alt="Timer" class="timer-icon">
                    <span class="timer-text" id="timer-text">5:45</span>
                </div>
            </div>

            <div class="hud-right">
                <!-- Spell Squares -->
                <div class="spells-container" id="spells-container">
                    <div class="spell-square red" id="spell-1" data-spell="red">
                        <img src="Spell 1.png" alt="Red Spell">
                        <div class="spell-icon-glow" id="spell-glow-1"></div>
                    </div>
                    <div class="spell-square blue" id="spell-2" data-spell="blue">
                        <img src="Spell 2.png" alt="Blue Spell">
                        <div class="spell-icon-glow" id="spell-glow-2"></div>
                    </div>
                    <div class="spell-square green" id="spell-3" data-spell="green">
                        <img src="Spell 3.png" alt="Green Spell">
                        <div class="spell-icon-glow" id="spell-glow-3"></div>
                    </div>
                    <div class="spell-bar-progress-text" id="spell-bar-progress-text"></div>
                </div>

                <!-- Stuns Badge -->
                <div class="stuns-badge">
                    <img src="Stun score.png" alt="Stuns">
                </div>
            </div>
        </div>

        <!-- Question Area -->
        <div class="question-container">
            <div class="question-box">
                <div class="question-card">
                    <div class="question-pill">
                        <span class="question-pill-text">18/30</span>
                    </div>
                    <p class="question-text">Ali wanted a kitten, so he decided to become a volunteer at the animal shelter. He was hoping t</p>
                </div>
            </div>
        </div>

        <!-- Answer Cards -->
        <div class="answer-cards-container">
            <div class="answer-card blue" data-correct="true">
                <span class="card-number">2</span>
                <span class="card-checkmark">✓</span>
                <span class="card-xmark">✗</span>
                Egyptian
            </div>
            <div class="answer-card cyan" data-correct="false">
                <span class="card-number">2</span>
                <span class="card-checkmark">✓</span>
                <span class="card-xmark">✗</span>
                Inca
            </div>
            <div class="answer-card orange" data-correct="false">
                <span class="card-number">2</span>
                <span class="card-checkmark">✓</span>
                <span class="card-xmark">✗</span>
                Greek
            </div>
            <div class="answer-card pink" data-correct="false">
                <span class="card-number">2</span>
                <span class="card-checkmark">✓</span>
                <span class="card-xmark">✗</span>
                Roman
            </div>
        </div>

        <!-- Confetti Container -->
        <div class="confetti-container" id="confetti-container"></div>
    </div>

    <div class="footer-info">
        Press 1-4 to select answers | C=correct, W=wrong, R=reset | ESC=back
    </div>

    <script>
        // ==================== PROGRESS TRACKING ====================
        const spellProgress = {
            magicMissile: 0,
            scatterShot: 0,
            rapidFire: 0
        };

        const CORRECT_INCREMENTS = { magicMissile: 10, scatterShot: 6, rapidFire: 9 };
        const WRONG_INCREMENTS = { magicMissile: 6, scatterShot: 3, rapidFire: 9 };

        const SPELL_GLOW_MAP = { magicMissile: 1, scatterShot: 2, rapidFire: 3 };

        let isAnimating = false;
        let score = 0;

        // ==================== DOM ELEMENTS ====================
        const cards = document.querySelectorAll('.answer-card');
        const confettiContainer = document.getElementById('confetti-container');
        const spellsContainer = document.getElementById('spells-container');
        const spellBarProgressText = document.getElementById('spell-bar-progress-text');

        const spellGlowElements = {
            magicMissile: document.getElementById('spell-glow-1'),
            scatterShot: document.getElementById('spell-glow-2'),
            rapidFire: document.getElementById('spell-glow-3')
        };

        const spellSquareElements = {
            magicMissile: document.getElementById('spell-1'),
            scatterShot: document.getElementById('spell-2'),
            rapidFire: document.getElementById('spell-3')
        };

        const spellColorClasses = {
            magicMissile: 'red',
            scatterShot: 'blue',
            rapidFire: 'green'
        };

        // ==================== CARD CLICK HANDLER ====================
        let animationQueue = [];
        let isProcessingQueue = false;
        let lastClickedCard = null;
        
        cards.forEach(card => {
            card.addEventListener('click', () => handleCardClick(card));
        });

        function handleCardClick(card) {
            if (card.classList.contains('disabled')) return;
            
            const isCorrect = card.dataset.correct === 'true';
            lastClickedCard = card;
            
            cards.forEach(c => c.classList.add('disabled'));
            
            if (isCorrect) {
                card.classList.add('selected-correct');
                createConfetti(card, 25);
                playSound('correct-ding');
                score += 10;
                queueHUDAnimation(CORRECT_INCREMENTS, true);
            } else {
                card.classList.add('selected-wrong');
                playSound('neutral-hmm');
                queueHUDAnimation(WRONG_INCREMENTS, false);
            }
            
            const cardFeedbackDuration = isCorrect ? 800 : 400;
            
            setTimeout(() => {
                enableCards();
            }, cardFeedbackDuration);
        }
        
        // ==================== NON-BLOCKING ANIMATION QUEUE ====================
        function queueHUDAnimation(increments, isBright) {
            animationQueue.push({ increments, isBright });
            if (!isProcessingQueue) processNextAnimation();
        }
        
        function processNextAnimation() {
            if (animationQueue.length === 0) {
                isProcessingQueue = false;
                return;
            }
            
            isProcessingQueue = true;
            const { increments, isBright } = animationQueue.shift();
            
            if (isBright) {
                animateBarWithFlying(increments, isBright, () => {
                    setTimeout(processNextAnimation, 100);
                });
            } else {
                animateBarSimple(increments, isBright, () => {
                    setTimeout(processNextAnimation, 100);
                });
            }
        }

        // ==================== BAR ANIMATION (SIMPLE - WRONG ANSWERS) ====================
        function animateBarSimple(increments, isBright, onComplete) {
            const spells = ['magicMissile', 'scatterShot', 'rapidFire'];
            const staggerDelay = 120;
            
            let totalIncrement = 0;
            spells.forEach(spell => totalIncrement += increments[spell]);
            
            spellsContainer.classList.add('glowing-dim');
            
            spellBarProgressText.textContent = `+${Math.round(totalIncrement / 3)}%`;
            spellBarProgressText.classList.add('visible');
            
            spells.forEach((spellName, index) => {
                setTimeout(() => {
                    animateSpellIconGlow(spellName, increments[spellName], isBright);
                }, index * staggerDelay);
            });
            
            const totalDuration = spells.length * staggerDelay + 350;
            setTimeout(() => {
                spellsContainer.classList.remove('glowing-dim');
                spellBarProgressText.classList.remove('visible');
                if (onComplete) onComplete();
            }, totalDuration);
        }

        // ==================== BAR ANIMATION WITH FLYING (CORRECT ANSWERS) ====================
        function animateBarWithFlying(increments, isBright, onComplete) {
            const sourceCard = lastClickedCard || document.querySelector('.answer-card');
            const sourceRect = sourceCard.getBoundingClientRect();
            const startX = sourceRect.left + sourceRect.width / 2;
            const startY = sourceRect.top + sourceRect.height / 2;

            const spells = ['magicMissile', 'scatterShot', 'rapidFire'];
            const flyStagger = 80;
            const flyDuration = 500;

            let totalIncrement = 0;
            Object.values(increments).forEach(val => totalIncrement += val);

            spellBarProgressText.textContent = `+${Math.round(totalIncrement / 3)}%`;
            spellBarProgressText.classList.add('visible');

            spells.forEach((spellName, index) => {
                const spellSquare = spellSquareElements[spellName];
                const colorClass = spellColorClasses[spellName];
                
                if (!spellSquare) return;

                const targetRect = spellSquare.getBoundingClientRect();
                const endX = targetRect.left + targetRect.width / 2;
                const endY = targetRect.top + targetRect.height / 2;

                setTimeout(() => {
                    createFlyingReward(startX, startY, endX, endY, colorClass, flyDuration, () => {
                        spellSquare.classList.add('receiving-reward');
                        animateSpellIconGlow(spellName, increments[spellName], isBright);
                        
                        const particleColor = colorClass === 'red' ? '#FF4444' : 
                                              colorClass === 'blue' ? '#00BFFF' : '#22c55e';
                        createParticleBurst(spellSquare, particleColor, 12, false);

                        setTimeout(() => {
                            spellSquare.classList.remove('receiving-reward');
                        }, 400);
                    });
                }, index * flyStagger);
            });

            const totalDuration = (spells.length - 1) * flyStagger + flyDuration + 400;
            setTimeout(() => {
                spellBarProgressText.classList.remove('visible');
                if (onComplete) onComplete();
            }, totalDuration);
        }

        // ==================== ANIMATE INDIVIDUAL SPELL ICON GLOW ====================
        function animateSpellIconGlow(spellName, increment, isBright) {
            const glowEl = spellGlowElements[spellName];
            if (!glowEl) return;
            
            const currentProgress = spellProgress[spellName];
            const newProgress = Math.min(currentProgress + increment, 100);
            
            const glowClass = isBright ? 'glowing-bright' : 'glowing-dim';
            glowEl.classList.add(glowClass);
            
            spellProgress[spellName] = newProgress;
            
            const toneIndex = ['magicMissile', 'scatterShot', 'rapidFire'].indexOf(spellName);
            const notes = isBright ? ['C4', 'E4', 'G4'] : ['C3', 'E3', 'G3'];
            playTone(notes[toneIndex]);
            
            if (newProgress >= 100 && currentProgress < 100) {
                triggerSpellUnlock(spellName);
            }
            
            const cleanupDelay = 300;
            setTimeout(() => {
                glowEl.classList.remove(glowClass);
            }, cleanupDelay);
        }

        // ==================== SPELL UNLOCK ====================
        function triggerSpellUnlock(spellName) {
            spellsContainer.classList.add('receiving-reward');
            createParticleBurst(spellsContainer, '#FFD700', 30, false);
            
            const readyText = document.createElement('div');
            readyText.textContent = 'SPELL READY!';
            readyText.style.cssText = `
                position: absolute;
                top: -30px;
                left: 50%;
                transform: translateX(-50%);
                font-size: 14px;
                font-weight: bold;
                color: #FFD700;
                text-shadow: 0 0 10px #FFD700;
                animation: float-up-fade 1.2s ease-out forwards;
                white-space: nowrap;
                z-index: 200;
            `;
            spellsContainer.appendChild(readyText);
            setTimeout(() => readyText.remove(), 1200);
            
            setTimeout(() => {
                spellsContainer.classList.remove('receiving-reward');
            }, 600);
            
            playSound('spell-unlocked');
        }

        // ==================== FLYING REWARD ANIMATION ====================
        function createFlyingReward(startX, startY, endX, endY, colorClass, duration, onComplete) {
            const flyingEl = document.createElement('div');
            flyingEl.className = `flying-reward ${colorClass}`;
            flyingEl.innerHTML = `<span class="icon">✦</span>`;
            flyingEl.style.left = startX + 'px';
            flyingEl.style.top = startY + 'px';
            flyingEl.style.transform = 'translate(-50%, -50%)';
            document.body.appendChild(flyingEl);

            const midX = (startX + endX) / 2;
            const midY = Math.min(startY, endY) - 80;

            const startTime = performance.now();
            let trailInterval = setInterval(() => createTrailParticle(flyingEl, colorClass), 25);

            function animate(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = easeInOutCubic(progress);

                const x = quadraticBezier(startX, midX, endX, eased);
                const y = quadraticBezier(startY, midY, endY, eased);

                flyingEl.style.left = x + 'px';
                flyingEl.style.top = y + 'px';

                const scale = 1 - progress * 0.3;
                const opacity = 1 - progress * 0.2;
                flyingEl.style.transform = `translate(-50%, -50%) scale(${scale})`;
                flyingEl.style.opacity = opacity;

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    clearInterval(trailInterval);
                    flyingEl.remove();
                    if (onComplete) onComplete();
                }
            }

            requestAnimationFrame(animate);
        }
        
        function createTrailParticle(parent, colorClass) {
            const rect = parent.getBoundingClientRect();
            const trail = document.createElement('div');
            trail.className = `flying-trail ${colorClass || 'spell-power'}`;
            trail.style.left = (rect.left + rect.width / 2) + 'px';
            trail.style.top = (rect.top + rect.height / 2) + 'px';
            document.body.appendChild(trail);

            trail.animate([
                { opacity: 1, transform: 'scale(1)' },
                { opacity: 0, transform: 'scale(0)' }
            ], { duration: 300, easing: 'ease-out' }).onfinish = () => trail.remove();
        }
        
        function quadraticBezier(p0, p1, p2, t) {
            return (1 - t) * (1 - t) * p0 + 2 * (1 - t) * t * p1 + t * t * p2;
        }
        
        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        // ==================== PARTICLE EFFECTS ====================
        function createParticleBurst(element, color, count, isMuted) {
            const rect = element.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'spell-particle';
                const particleColor = isMuted ? '#999' : color;
                particle.style.background = particleColor;
                particle.style.boxShadow = isMuted ? 'none' : `0 0 4px ${color}`;
                particle.style.width = (3 + Math.random() * 4) + 'px';
                particle.style.height = particle.style.width;
                particle.style.left = centerX + 'px';
                particle.style.top = centerY + 'px';
                particle.style.zIndex = '200';

                const angle = (Math.random() * 360) * Math.PI / 180;
                const distance = 20 + Math.random() * 40;
                particle.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
                particle.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);

                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 500);
            }
        }

        function createConfetti(sourceElement, count) {
            const rect = sourceElement.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const colors = ['#FFD700', '#FFFFFF', '#9B59B6', '#00CED1', '#FF69B4', '#00FF88'];

            for (let i = 0; i < count; i++) {
                const confetti = document.createElement('div');
                confetti.style.position = 'fixed';
                confetti.style.width = (6 + Math.random() * 10) + 'px';
                confetti.style.height = confetti.style.width;
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = centerX + 'px';
                confetti.style.top = centerY + 'px';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                confetti.style.pointerEvents = 'none';
                confetti.style.zIndex = '500';

                confettiContainer.appendChild(confetti);

                const angle = Math.random() * Math.PI * 2;
                const velocity = 150 + Math.random() * 200;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity - 150;
                const rotation = Math.random() * 720 - 360;

                confetti.animate([
                    { opacity: 1, transform: 'translate(0, 0) rotate(0deg) scale(1)' },
                    { opacity: 0.8, transform: `translate(${tx * 0.5}px, ${ty * 0.5}px) rotate(${rotation * 0.5}deg) scale(0.8)`, offset: 0.5 },
                    { opacity: 0, transform: `translate(${tx}px, ${ty}px) rotate(${rotation}deg) scale(0.2)` }
                ], {
                    duration: 900 + Math.random() * 400,
                    easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
                    fill: 'forwards'
                }).onfinish = () => confetti.remove();
            }
        }

        // ==================== HELPER FUNCTIONS ====================
        function enableCards() {
            cards.forEach(card => {
                card.classList.remove('disabled', 'selected-correct', 'selected-wrong');
            });
        }

        function playSound(soundName) {
            console.log('Sound:', soundName);
        }

        function playTone(note) {
            console.log('Tone:', note);
        }

        // ==================== DEMO FUNCTIONS ====================
        function triggerCorrect() {
            if (isAnimating) return;
            const correctCard = document.querySelector('[data-correct="true"]');
            handleCardClick(correctCard);
        }

        function triggerWrong() {
            if (isAnimating) return;
            const wrongCard = document.querySelector('[data-correct="false"]');
            handleCardClick(wrongCard);
        }

        function resetAll() {
            if (isAnimating) return;
            
            ['magicMissile', 'scatterShot', 'rapidFire'].forEach(spellName => {
                spellProgress[spellName] = 0;
                const glowEl = spellGlowElements[spellName];
                if (glowEl) glowEl.classList.remove('glowing-bright', 'glowing-dim');
            });
            
            spellsContainer.classList.remove('receiving-reward', 'glowing-bright', 'glowing-dim');
            spellBarProgressText.classList.remove('visible');
            
            enableCards();
            score = 0;
            confettiContainer.innerHTML = '';
            isAnimating = false;
            lastClickedCard = null;
            
            document.querySelectorAll('.flying-reward, .flying-trail').forEach(el => el.remove());
        }

        // ==================== KEYBOARD SHORTCUTS ====================
        document.addEventListener('keydown', (e) => {
            if (e.key === '1') handleCardClick(cards[0]);
            if (e.key === '2') handleCardClick(cards[1]);
            if (e.key === '3') handleCardClick(cards[2]);
            if (e.key === '4') handleCardClick(cards[3]);
            if (e.key === 'r' || e.key === 'R') resetAll();
            if (e.key === 'c' || e.key === 'C') triggerCorrect();
            if (e.key === 'w' || e.key === 'W') triggerWrong();
            if (e.key === 'Escape') window.location.href = 'index.html';
        });

        // ==================== INIT ====================
        console.log('Wayarena Figma Q&A Screen V2 Loaded!');
        console.log('Keys: 1-4 select cards, C=correct, W=wrong, R=reset, ESC=back');
    </script>
</body>
